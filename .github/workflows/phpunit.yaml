name: PHP Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-matrix:
    name: Build WP/PHP Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        name: Generate matrix JSON
        shell: bash
        run: |
          declare -A wp_php
          wp_php["trunk"]="7.4 8.0 8.1 8.2 8.3 8.4 8.5"
          wp_php["7.0"]="7.4 8.0 8.1 8.2 8.3 8.4 8.5"
          wp_php["6.9"]="7.4 8.0 8.1 8.2 8.3 8.4 8.5"
          wp_php["6.8"]="7.4 8.0 8.1 8.2 8.3 8.4"
          wp_php["6.7"]="7.4 8.0 8.1 8.2 8.3 8.4"
          wp_php["6.6"]="7.4 8.0 8.1 8.2 8.3"
          wp_php["6.5"]="7.4 8.0 8.1 8.2 8.3"
          wp_php["6.4"]="7.4 8.0 8.1 8.2 8.3"
          wp_php["6.3"]="7.4 8.0 8.1 8.2"
          wp_php["6.2"]="7.4 8.0 8.1 8.2"
          wp_php["6.1"]="7.4 8.0 8.1 8.2"
          wp_php["6.0"]="7.4 8.0 8.1"

          matrix='{"include":[]}'
          mapfile -t wp_versions < <(
            {
              printf '%s\n' "${!wp_php[@]}" | grep -x 'trunk' || true
              printf '%s\n' "${!wp_php[@]}" | grep -vx 'trunk' | sort -rV
            }
          )

          for wp_version in "${wp_versions[@]}"; do
            for php_version in ${wp_php[$wp_version]}; do
              matrix=$(jq \
                --arg wp "$wp_version" \
                --arg php "$php_version" \
                '.include += [{"wp-versions": $wp, "php-versions": $php}]' \
                <<< "$matrix")
            done
          done

          echo "matrix=$(jq -c . <<< "$matrix")" >> "$GITHUB_OUTPUT"

  phpunit:
    needs: build-matrix
    runs-on: ubuntu-latest
    env:
      DB_DATABASE: wordpress_test
      DB_USER: root
      DB_PASSWORD: root
    strategy:
      matrix: ${{ fromJSON(needs.build-matrix.outputs.matrix) }}
    name: WP ${{ matrix.wp-versions }} / PHP ${{ matrix.php-versions }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}

    - name: Install Subversion.
      run: |
        sudo apt-get update -y
        sudo apt-get install -y subversion

    - name: Check PHP Version
      run: php -v

    - name: Composer install
      run: composer install --optimize-autoloader --prefer-dist

    - name: Install WP Tests
      run: |
        sudo /etc/init.d/mysql start
        bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp-versions }}

    - name: PHPUnit tests
      run: ./vendor/bin/phpunit
      env:
        WP_TESTS_DIR: ${{ runner.temp }}/wordpress-tests-lib
        WP_CORE_DIR: ${{ runner.temp }}/wordpress

  required-status-checks:
    # This should be configured as the required status check in branch protection rules
    #
    # Using a summary job allows for easier management of the PHP Unit matrix as the
    # required status check will not need to be updated when matrix items change.
    name: PHPUnit Required Status Checks
    runs-on: 'ubuntu-24.04'
    needs: [ 'phpunit' ]
    if: ${{ always() }}
    steps:
      - name: Detect any failing status checks
        run: |
          [[ "${{ join(needs.*.result, ' ') }}" =~ ^(success ?)+$ ]] || exit 1
