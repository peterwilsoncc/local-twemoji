name: Deploy to WordPress.org Repository

on:
  push:
    tags:
    - "*"

jobs:
  deploy_to_wp_repository:
    name: Deploy to WP.org
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Subversion.
      run: |
        # Check if SVN is installed, if not install it.
        if ! command -v svn &> /dev/null
        then
            sudo apt-get update -y
            sudo apt-get install -y subversion
        fi

    - name: Remove unneeded files WordPress.org deploy.
      run: |
        git rm --ignore-unmatch readme.md
        git rm --ignore-unmatch composer.json
        git rm --ignore-unmatch composer.lock
        git config --global user.email "wilson+peterwilsonbcc@peterwilson.cc"
        git config --global user.name "peterwilsonbcc"
        git commit -m "Remove unneeded files for WordPress.org deploy"

    - name: Create .wordpress-org directory if it doesn't exist.
      run: mkdir -p .wordpress-org

    - name: WordPress Plugin Deploy
      id: deploy
      uses: 10up/action-wordpress-plugin-deploy@stable
      with:
        generate-zip: true

      env:
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ github.workspace }}/${{ github.event.repository.name }}.zip
